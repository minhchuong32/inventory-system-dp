<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::main}, 'products')}">
<head><title th:text="${product.id==null}?'Thêm sản phẩm':'Sửa sản phẩm'">Form SP</title></head>
<body><main>
<div class="row justify-content-center"><div class="col-lg-9">
    <div class="card">
        <div class="card-header">
            <h6 class="card-title">
                <i th:class="${product.id==null}?'bi bi-plus-circle':'bi bi-pencil-square'"></i>
                <span th:text="${product.id==null}?'Thêm sản phẩm mới':'Cập nhật sản phẩm'"></span>
            </h6>
            <a th:href="@{/products}" class="btn-sm-action btn-view"><i class="bi bi-arrow-left"></i> Quay lại</a>
        </div>
        <div class="card-body">
            <form th:action="@{/products/save}" method="post" th:object="${product}">
                <input type="hidden" th:field="*{id}">
                <div class="form-section">
                    <div class="form-section-title"><i class="bi bi-info-circle"></i> Thông tin cơ bản</div>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Mã sản phẩm *</label>
                            <input type="text" th:field="*{code}" class="form-control" th:classappend="${#fields.hasErrors('code')}?'is-invalid'" placeholder="SP00001">
                            <div class="invalid-feedback" th:errors="*{code}"></div>
                            <small class="text-muted">Để trống để tự sinh mã</small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tên sản phẩm *</label>
                            <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')}?'is-invalid'" placeholder="Tên sản phẩm">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Barcode</label>
                            <input type="text" th:field="*{barcode}" class="form-control" placeholder="Barcode/QR">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Danh mục</label>
                            <select th:field="*{category.id}" class="form-select">
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Nhà cung cấp</label>
                            <select th:field="*{supplier.id}" class="form-select">
                                <option value="">-- Chọn NCC --</option>
                                <option th:each="s:${suppliers}" th:value="${s.id}" th:text="${s.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Đơn vị tính</label>
                            <select th:field="*{unit.id}" class="form-select">
                                <option value="">-- Chọn --</option>
                                <option th:each="u:${units}" th:value="${u.id}" th:text="${u.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Kho lưu trữ</label>
                            <select th:field="*{warehouse.id}" class="form-select">
                                <option value="">-- Chọn kho --</option>
                                <option th:each="w:${warehouses}" th:value="${w.id}" th:text="${w.name}"></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-section">
                    <div class="form-section-title"><i class="bi bi-currency-dollar"></i> Giá & Tồn kho</div>
                    <div class="row g-3">
                        <div class="col-md-3"><label class="form-label">Giá nhập (₫)</label>
                            <input type="number" th:field="*{costPrice}" class="form-control" min="0" step="1000" placeholder="0"></div>
                        <div class="col-md-3"><label class="form-label">Giá bán (₫)</label>
                            <input type="number" th:field="*{sellPrice}" class="form-control" min="0" step="1000" placeholder="0"></div>
                        <div class="col-md-2"><label class="form-label">Tồn kho min</label>
                            <input type="number" th:field="*{minQuantity}" class="form-control" min="0" placeholder="5"></div>
                        <div class="col-md-2"><label class="form-label">Tồn kho max</label>
                            <input type="number" th:field="*{maxQuantity}" class="form-control" min="0"></div>
                        <div class="col-md-2"><label class="form-label">Khối lượng (kg)</label>
                            <input type="number" th:field="*{weight}" class="form-control" min="0" step="0.001"></div>
                    </div>
                </div>
                <div class="form-section">
                    <div class="form-section-title"><i class="bi bi-card-text"></i> Mô tả & Trạng thái</div>
                    <div class="row g-3">
                        <div class="col-md-9"><label class="form-label">Mô tả</label>
                            <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Mô tả chi tiết..."></textarea></div>
                        <div class="col-md-3"><label class="form-label">Trạng thái</label>
                            <select th:field="*{status}" class="form-select">
                                <option value="true">Hoạt động</option>
                                <option value="false">Ngừng kinh doanh</option>
                            </select></div>
                    </div>
                </div>
                <div class="d-flex gap-3 justify-content-end">
                    <a th:href="@{/products}" class="btn btn-light">Hủy</a>
                    <button type="submit" class="btn-primary-custom"><i class="bi bi-save"></i> Lưu sản phẩm</button>
                </div>
            </form>
        </div>
    </div>
</div></div>
</main></body></html>
