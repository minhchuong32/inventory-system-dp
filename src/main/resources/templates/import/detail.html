<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::main}, 'imports')}">
<head><title th:text="'Phiếu nhập '+${order.code}">Chi tiết phiếu nhập</title></head>
<body><main>
<div class="card mb-4" style="border-left:4px solid var(--primary);">
    <div class="card-body">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h5 style="font-weight:700;color:var(--primary);">
                    <i class="bi bi-download"></i> PHIẾU NHẬP KHO: <span th:text="${order.code}"></span>
                </h5>
                <div class="row mt-2 g-3">
                    <div class="col-auto">
                        <span style="font-size:13px;color:#888;">Ngày nhập:</span>
                        <strong th:text="${#temporals.format(order.orderDate,'dd/MM/yyyy')}"></strong>
                    </div>
                    <div class="col-auto">
                        <span style="font-size:13px;color:#888;">Nhà cung cấp:</span>
                        <strong th:text="${order.supplier?.name ?: '—'}"></strong>
                    </div>
                    <div class="col-auto" th:if="${order.invoiceNumber}">
                        <span style="font-size:13px;color:#888;">Số HĐ:</span>
                        <strong th:text="${order.invoiceNumber}"></strong>
                    </div>
                    <div class="col-auto">
                        <span class="badge-status" th:class="'badge-status '+${order.status.cssClass}"
                              th:text="${order.status.displayName}"></span>
                    </div>
                    <div class="col-auto">
                        <span th:class="'badge-status '+(${order.paymentStatus.name()=='PAID'}?'badge-completed':
                                         (${order.paymentStatus.name()=='PARTIAL'}?'badge-pending':'badge-cancelled'))"
                              th:text="${order.paymentStatus.displayName}"></span>
                    </div>
                </div>
                <div th:if="${order.note}" class="mt-2" style="font-size:13px;color:#777;">
                    <i class="bi bi-chat-text"></i> <em th:text="${order.note}"></em>
                </div>
            </div>
            <div class="col-md-4 text-end">
                <div style="font-size:12px;color:#888;">TỔNG TIỀN</div>
                <div style="font-size:28px;font-weight:700;color:var(--primary);"
                     th:text="${#numbers.formatDecimal(order.finalAmount,0,'COMMA',0,'POINT')+' ₫'}"></div>
                <div class="d-flex gap-2 justify-content-end mt-3 no-print">
                    <a th:href="@{/imports}" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i> Danh sách</a>
                    <button onclick="window.print()" class="btn btn-outline-secondary btn-sm"><i class="bi bi-printer"></i> In phiếu</button>
                    <form sec:authorize="hasAnyRole('ADMIN','MANAGER')" th:if="${order.pending}" th:action="@{/imports/{id}/complete(id=${order.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Xác nhận nhập kho? Tồn kho sẽ được cập nhật!')">
                        <button type="submit" class="btn btn-success btn-sm"><i class="bi bi-check-circle"></i> Xác nhận nhập kho</button>
                    </form>
                    <form sec:authorize="hasAnyRole('ADMIN','MANAGER')" th:if="${order.pending}" th:action="@{/imports/{id}/cancel(id=${order.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Hủy phiếu nhập này?')">
                        <button type="submit" class="btn btn-danger btn-sm"><i class="bi bi-x-circle"></i> Hủy phiếu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header"><h6 class="card-title"><i class="bi bi-list-ul"></i> Chi tiết hàng nhập</h6></div>
    <div class="table-wrapper">
        <table class="inv-table">
            <thead><tr>
                <th>#</th><th>Mã SP</th><th>Tên sản phẩm</th><th>Đơn vị</th>
                <th>Số lượng</th><th>Đơn giá</th><th>Thành tiền</th>
                <th>Hạn sử dụng</th><th>Lô hàng</th>
            </tr></thead>
            <tbody>
            <tr th:each="d,stat : ${order.details}">
                <td th:text="${stat.index+1}" style="color:#aaa;"></td>
                <td><span style="font-family:monospace;color:var(--primary);font-weight:600;" th:text="${d.product.code}"></span></td>
                <td style="font-weight:600;" th:text="${d.product.name}"></td>
                <td th:text="${d.product.unitName ?: '—'}"></td>
                <td style="text-align:center;font-weight:600;" th:text="${d.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(d.unitPrice,0,'COMMA',0,'POINT')+' ₫'}"></td>
                <td style="font-weight:700;color:var(--primary);"
                    th:text="${#numbers.formatDecimal(d.totalPrice,0,'COMMA',0,'POINT')+' ₫'}"></td>
                <td th:text="${d.expiryDate!=null?#temporals.format(d.expiryDate,'dd/MM/yyyy'):'—'}"></td>
                <td th:text="${d.batchNumber ?: '—'}" style="font-size:12px;color:#888;"></td>
            </tr>
            </tbody>
            <tfoot>
            <tr style="background:#e8eaf6;">
                <td colspan="6" style="text-align:right;font-weight:700;padding:12px 16px;">TỔNG CỘNG:</td>
                <td style="font-weight:700;color:var(--primary);font-size:16px;padding:12px 16px;"
                    th:text="${#numbers.formatDecimal(order.finalAmount,0,'COMMA',0,'POINT')+' ₫'}"></td>
                <td colspan="2"></td>
            </tr>
            </tfoot>
        </table>
    </div>
</div>
</main></body></html>
