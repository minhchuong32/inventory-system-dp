<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::main}, 'customers')}">
<head><title th:text="${customer.id==null}?'Thêm khách hàng':'Sửa khách hàng'">Form KH</title></head>
<body><main>
<div class="row justify-content-center"><div class="col-lg-7">
    <div class="card">
        <div class="card-header">
            <h6 class="card-title"><i class="bi bi-person-plus"></i>
                <span th:text="${customer.id==null}?'Thêm khách hàng':'Cập nhật khách hàng'"></span>
            </h6>
            <a th:href="@{/customers}" class="btn-sm-action btn-view"><i class="bi bi-arrow-left"></i> Quay lại</a>
        </div>
        <div class="card-body">
            <form th:action="@{/customers/save}" method="post" th:object="${customer}">
                <input type="hidden" th:field="*{id}">
                <div class="form-section">
                    <div class="form-section-title"><i class="bi bi-info-circle"></i> Thông tin khách hàng</div>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Mã KH *</label>
                            <input type="text" th:field="*{code}" class="form-control" th:classappend="${#fields.hasErrors('code')}?'is-invalid'" placeholder="KH0001">
                            <div class="invalid-feedback" th:errors="*{code}"></div>
                        </div>
                        <div class="col-md-9">
                            <label class="form-label">Tên khách hàng *</label>
                            <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')}?'is-invalid'" placeholder="Tên khách hàng">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Điện thoại</label>
                            <input type="text" th:field="*{phone}" class="form-control" placeholder="0901234567">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')}?'is-invalid'" placeholder="email@example.com">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Mã số thuế</label>
                            <input type="text" th:field="*{taxCode}" class="form-control" placeholder="0300000000">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" th:field="*{address}" class="form-control" placeholder="Địa chỉ">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Loại KH</label>
                            <select th:field="*{customerType}" class="form-select">
                                <option value="RETAIL">Bán lẻ</option>
                                <option value="WHOLESALE">Bán sỉ</option>
                                <option value="VIP">VIP</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Trạng thái</label>
                            <select th:field="*{status}" class="form-select">
                                <option value="true">Hoạt động</option>
                                <option value="false">Ngừng</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-3 justify-content-end">
                    <a th:href="@{/customers}" class="btn btn-light">Hủy</a>
                    <button type="submit" class="btn-primary-custom"><i class="bi bi-save"></i> Lưu khách hàng</button>
                </div>
            </form>
        </div>
    </div>
</div></div>
</main></body></html>
