<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/base :: layout(~{::title/text()}, ~{::main}, 'exports')}"
>
  <head>
    <title>Tạo phiếu xuất kho</title>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="card-header">
          <h6 class="card-title">
            <i class="bi bi-upload"></i> Tạo phiếu xuất kho mới
          </h6>
          <a th:href="@{/exports}" class="btn-sm-action btn-view"
            ><i class="bi bi-arrow-left"></i> Quay lại</a
          >
        </div>
        <div class="card-body">
          <form action="/exports/save" method="post" id="exportForm">
            <div class="row g-4 mb-3">
              <div class="col-md-4">
                <div class="form-section">
                  <div class="form-section-title">
                    <i class="bi bi-people"></i> Khách hàng
                  </div>
                  <select name="customerId" class="form-select">
                    <option value="">-- Chọn khách hàng (tùy chọn) --</option>
                    <option
                      th:each="c : ${customers}"
                      th:value="${c.id}"
                      th:text="${c.name + ' (' + c.code + ')'}"
                    ></option>
                  </select>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-section">
                  <div class="form-section-title">
                    <i class="bi bi-geo-alt"></i> Địa chỉ giao hàng
                  </div>
                  <input
                    type="text"
                    name="deliveryAddress"
                    class="form-control"
                    placeholder="Địa chỉ giao hàng"
                  />
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-section">
                  <div class="form-section-title">
                    <i class="bi bi-card-text"></i> Ghi chú
                  </div>
                  <textarea
                    name="note"
                    class="form-control"
                    rows="3"
                    placeholder="Ghi chú..."
                  ></textarea>
                </div>
              </div>
            </div>

            <div class="form-section">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <div class="form-section-title mb-0">
                  <i class="bi bi-list-ul"></i> Danh sách hàng xuất
                </div>
                <button
                  type="button"
                  class="btn-primary-custom"
                  onclick="addRow()"
                >
                  <i class="bi bi-plus-lg"></i> Thêm dòng
                </button>
              </div>
              <div class="table-wrapper">
                <table class="inv-table">
                  <thead>
                    <tr>
                      <th style="width: 40px">#</th>
                      <th>Sản phẩm *</th>
                      <th style="width: 80px">Tồn kho</th>
                      <th style="width: 80px">Đơn vị</th>
                      <th style="width: 110px">Số lượng *</th>
                      <th style="width: 150px">Đơn giá *</th>
                      <th style="width: 90px">CK (%)</th>
                      <th style="width: 150px">Thành tiền</th>
                      <th style="width: 44px"></th>
                    </tr>
                  </thead>
                  <tbody id="detailBody"></tbody>
                  <tfoot>
                    <tr style="background: #f8f9ff">
                      <td
                        colspan="7"
                        style="
                          text-align: right;
                          font-weight: 700;
                          padding: 12px 16px;
                        "
                      >
                        TỔNG CỘNG:
                      </td>
                      <td
                        style="
                          font-weight: 700;
                          color: var(--primary);
                          font-size: 16px;
                          padding: 12px 16px;
                        "
                        id="grandTotal"
                      >
                        0 ₫
                      </td>
                      <td></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>

            <div class="d-flex gap-3 justify-content-end mt-3">
              <a th:href="@{/exports}" class="btn btn-light">Hủy</a>
              <button type="submit" class="btn-primary-custom">
                <i class="bi bi-save"></i> Lưu phiếu xuất
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Datalist server-side — không inject Java object vào JS -->
      <datalist id="productList">
        <option
          th:each="p : ${products}"
          th:value="${p.id}"
          th:label="${p.name}"
          th:data-code="${p.code}"
          th:data-unit="${p.unitName}"
          th:data-price="${p.sellPrice}"
          th:data-qty="${p.quantity}"
        ></option>
      </datalist>

      <script>
        let rowCount = 0;

        function getProductOptions() {
          let opts = '<option value="">-- Chọn sản phẩm --</option>';
          document.querySelectorAll("#productList option").forEach((opt) => {
            const id = opt.getAttribute("value");
            const name = opt.getAttribute("label");
            const code = opt.getAttribute("data-code");
            const qty = opt.getAttribute("data-qty") || 0;
            opts += `<option value="${id}">${name} (${code}) — tồn: ${qty}</option>`;
          });
          return opts;
        }

        function getProductById(id) {
          const opt = document.querySelector(
            `#productList option[value="${id}"]`,
          );
          if (!opt) return null;
          return {
            unit: opt.getAttribute("data-unit") || "—",
            sellPrice: parseFloat(opt.getAttribute("data-price") || 0),
            qty: parseInt(opt.getAttribute("data-qty") || 0),
          };
        }

        function addRow() {
          rowCount++;
          const tbody = document.getElementById("detailBody");
          const tr = document.createElement("tr");
          tr.id = "row-" + rowCount;
          tr.innerHTML = `
        <td style="color:#aaa;font-weight:600;">${rowCount}</td>
        <td>
            <select name="productIds" class="form-select" required
                    onchange="onProductSelect(this, ${rowCount})">
                ${getProductOptions()}
            </select>
        </td>
        <td><span id="stock-${rowCount}" style="font-size:13px;color:#888;">—</span></td>
        <td><span id="unit-${rowCount}"  style="font-size:13px;color:#888;">—</span></td>
        <td><input type="number" name="quantities" id="qty-${rowCount}"
                   class="form-control" min="1" value="1" required
                   oninput="calcRow(${rowCount})"></td>
        <td><input type="number" name="unitPrices" id="price-${rowCount}"
                   class="form-control" min="0" value="0" step="1000" required
                   oninput="calcRow(${rowCount})"></td>
        <td><input type="number" name="discountPercents" id="disc-${rowCount}"
                   class="form-control" min="0" max="100" value="0" step="1"
                   oninput="calcRow(${rowCount})"></td>
        <td><span id="total-${rowCount}" style="font-weight:600;color:var(--primary);">0 ₫</span></td>
        <td>
            <button type="button" class="btn-sm-action btn-delete"
                    onclick="removeRow(${rowCount})">
                <i class="bi bi-trash"></i>
            </button>
        </td>`;
          tbody.appendChild(tr);
          calcRow(rowCount);
        }

        function onProductSelect(sel, rowId) {
          const p = getProductById(sel.value);
          if (p) {
            document.getElementById("unit-" + rowId).textContent = p.unit;
            document.getElementById("stock-" + rowId).textContent = p.qty;
            document.getElementById("price-" + rowId).value = p.sellPrice;
            calcRow(rowId);
          }
        }

        function calcRow(rowId) {
          const qty = parseFloat(
            document.getElementById("qty-" + rowId)?.value || 0,
          );
          const price = parseFloat(
            document.getElementById("price-" + rowId)?.value || 0,
          );
          const disc = parseFloat(
            document.getElementById("disc-" + rowId)?.value || 0,
          );
          const total = qty * price * (1 - disc / 100);
          const el = document.getElementById("total-" + rowId);
          if (el) el.textContent = total.toLocaleString("vi-VN") + " ₫";
          calcGrand();
        }

        function calcGrand() {
          let grand = 0;
          document.querySelectorAll('[id^="total-"]').forEach((el) => {
            grand += parseFloat(el.textContent.replace(/[^\d]/g, "")) || 0;
          });
          document.getElementById("grandTotal").textContent =
            grand.toLocaleString("vi-VN") + " ₫";
        }

        function removeRow(rowId) {
          document.getElementById("row-" + rowId)?.remove();
          calcGrand();
        }

        document
          .getElementById("exportForm")
          .addEventListener("submit", function (e) {
            const rows = document.querySelectorAll("#detailBody tr");
            if (!rows.length) {
              e.preventDefault();
              alert("Vui lòng thêm ít nhất 1 sản phẩm!");
              return;
            }
            let valid = true;
            document
              .querySelectorAll('#detailBody select[name="productIds"]')
              .forEach((sel) => {
                if (!sel.value) valid = false;
              });
            if (!valid) {
              e.preventDefault();
              alert("Vui lòng chọn sản phẩm cho tất cả các dòng!");
            }
          });

        addRow();
      </script>
    </main>
  </body>
</html>
