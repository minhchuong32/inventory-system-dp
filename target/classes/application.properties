# ===================================
# INVENTORY SYSTEM - CONFIGURATION
# ===================================
server.port=8080

# SQL SERVER
spring.datasource.url=jdbc:sqlserver://MINH-CHUONG:1433;databaseName=inventory_db;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=2357
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=true

# THYMELEAF
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# SECURITY
spring.security.user.name=admin
spring.security.user.password=admin123

# APP
app.name=Inventory Management System
app.version=2.0.0
app.pagination.default-size=10

# LOGGING
logging.level.com.inventory=DEBUG
logging.level.org.springframework.security=INFO
